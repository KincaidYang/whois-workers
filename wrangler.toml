name = "whois-workers"
main = "src/index.ts"
compatibility_date = "2026-06-13"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "WHOIS_CACHE"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_ID"

[triggers]
crons = ["0 0 * * *"]

[vars]
WHOIS_TIMEOUT = 10000
CACHE_TTL = 3600
NEGATIVE_CACHE_TTL = 60
