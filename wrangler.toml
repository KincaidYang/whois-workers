name = "whois-workers"
main = "src/index.ts"
compatibility_date = "2026-06-13"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "WHOIS_CACHE"
id = "whois_cache"
preview_id = "whois_cache_preview"

[triggers]
crons = ["0 0 * * *"]

[vars]
WHOIS_TIMEOUT = 10000
CACHE_TTL = 3600
NEGATIVE_CACHE_TTL = 60
